name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # src-layout package: an editable install is required so tests/ can
      # import the installed traceyield package (E3-F1-S4). Stdlib-only
      # otherwise -- no runtime dependencies. Tests parametrize their
      # root=/path= seams to temp dirs, so no ~/.claude or ~/.codex data,
      # secrets, or network access are needed.
      - name: Install package (editable)
        run: pip install -e .
      - name: Run test suite
        run: python -m unittest discover -s tests
