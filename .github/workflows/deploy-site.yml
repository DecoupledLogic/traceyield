name: Deploy site

# Build the Astro docs site under site/ and publish it to GitHub Pages.
# This replaces the legacy Jekyll build of /docs as the source for
# https://decoupledlogic.github.io/traceyield/ . Pages must be set to the
# "GitHub Actions" build type for the deploy step to publish (one-time switch).
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# Least-privilege token plus the scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; queue the next one instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build (astro build + pagefind index)
        working-directory: site
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
