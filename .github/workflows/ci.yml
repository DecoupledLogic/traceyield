name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # E3-F1-S5: the suite now runs against a BUILT AND INSTALLED WHEEL,
      # not an editable install, so CI proves the package actually installs
      # and works the way an end user gets it (`pip install traceyield`).
      # `build` is a CI-only tool -- it must never appear in
      # [project].dependencies; the installed runtime stays stdlib-only.
      - name: Install build tool
        run: pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Install built wheel
        run: pip install dist/*.whl
      - name: Prove the install is the wheel, not the source tree
        # With a src-layout there is no top-level traceyield/ dir at the repo
        # root, so this can't accidentally import the checkout either way --
        # but assert it explicitly and fail loudly so an editable-only run
        # can never masquerade as a wheel run.
        run: |
          python -c "
          import os
          import traceyield
          installed_at = os.path.abspath(traceyield.__file__)
          repo_root = os.path.abspath(os.getcwd())
          print(f'traceyield imported from: {installed_at}')
          assert 'site-packages' in installed_at.replace(os.sep, '/'), (
              f'traceyield did not import from site-packages: {installed_at}'
          )
          assert not installed_at.startswith(repo_root + os.sep), (
              f'traceyield imported from the checkout, not the installed wheel: {installed_at}'
          )
          "
      - name: Run test suite (against the installed wheel)
        run: python -m unittest discover -s tests
      # CLI smoke: the console script must come from the wheel's entry point
      # (i.e. it is on PATH after `pip install dist/*.whl`), and each of
      # these must exit 0. Deliberately limited to these three commands --
      # `traceyield report` is NOT run in CI: it would try to parse
      # ~/.claude (empty/absent here) and, more importantly, under a wheel
      # install `--machine-dir` currently resolves relative to the install
      # location (see the KNOWN GAP note below), so running the full
      # pipeline here could attempt to write inside site-packages.
      - name: CLI smoke -- traceyield --help
        run: traceyield --help
      # KNOWN GAP (tracked by E3-F4-S1): report.py's HERE anchor walks up
      # three directories from its own file to reach the repo root, which is
      # correct for a source checkout but not once installed into
      # site-packages -- three levels up from
      # site-packages/traceyield/report.py lands somewhere inside the
      # Python install/venv, not a meaningful data directory. Defining the
      # installed application's real data-directory policy (env overrides,
      # pipx-safe, never write into the install dir) is out of scope for
      # this story; here we only assert the command exits 0 and prints a
      # single non-empty path -- NOT that the path is the repo root, because
      # under this wheel install it will not be.
      - name: CLI smoke -- traceyield --machine-dir
        run: traceyield --machine-dir
      - name: CLI smoke -- python -m traceyield
        run: python -m traceyield
